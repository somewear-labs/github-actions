name: PR-title Jira-key (act test harness)
# This workflow is used ONLY by the act-based integration test suite (scripts/run-act-tests.sh).
# It mirrors the logic of pr-title-jira.yml but:
#   - is triggered by workflow_dispatch so act can invoke it with synthetic fixtures
#     WITHOUT also firing on real PRs opened against this repo (which would happen with
#     pull_request_target since github-actions is itself a github-actions repo)
#   - uses the checked-out workspace rather than fetching from GitHub
#   - reads test-seam env vars (MOCK_*) from the runner environment (set via act --env flags)
# workflow_dispatch never fires automatically — it must be invoked explicitly, which act does
# via `act workflow_dispatch -e <event.json>`. Real GitHub PRs cannot fire this workflow.

on:
  workflow_dispatch:

jobs:
  pr-title-jira:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime deps
        run: npm ci --omit=dev
        shell: bash

      - name: Run PR-title-Jira logic
        uses: actions/github-script@v7
        # Note: MOCK_* env vars and JIRA_BASE_URL are passed via act's --env flags and
        # flow through to process.env in the script without being listed here.
        # JIRA_API_TOKEN comes from act -s secret flag.
        # github-token is provided explicitly so act does not need GITHUB_TOKEN set as
        # a secret (which would cause actions/checkout@v4 to attempt a real git clone).
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        with:
          # Provide a dummy token for act; MOCK_NO_GH_API=1 bypasses all real API calls.
          github-token: ${{ secrets.GITHUB_TOKEN || secrets.JIRA_API_TOKEN || 'act-dummy-token' }}
          script: |
            const path = require('path');
            const cwd = process.env.GITHUB_WORKSPACE;
            process.chdir(cwd);
            const main = require(path.join(cwd, 'lib', 'main.js'));
            await main({ github, context, core });
