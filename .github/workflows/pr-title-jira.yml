name: PR-title Jira-key (reusable)

on:
  workflow_call:
    secrets:
      JIRA_API_TOKEN:
        required: true

jobs:
  pr-title-jira:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout reusable-workflow repo at v1
        # Reads schema/ and lib/ from this repo. github.action_path is not
        # available in reusable workflows, so we checkout explicitly.
        #
        # ref: 'v1' (the moving major tag) — pinning to a static ref here
        # because github.workflow_sha resolves to the *caller's* commit SHA
        # under pull_request_target (not the called workflow's), which causes
        # actions/checkout to look up a non-existent SHA on this repo.
        # Consumers pin via `uses: ...@v1` and that's what gets checked out.
        # On a breaking v2, this needs a manual bump too.
        uses: actions/checkout@v4
        with:
          repository: somewear-labs/github-actions
          ref: v1
          path: .pr-title-jira

      - name: Install runtime deps
        run: |
          cd .pr-title-jira
          npm ci --omit=dev || npm install --omit=dev js-yaml@4 ajv@8 ajv-formats@3
        shell: bash

      - name: Run PR-title-Jira logic
        uses: actions/github-script@v7
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL || 'https://somewearlabs.atlassian.net' }}
          MOCK_SCENARIO: ${{ vars.MOCK_SCENARIO || '' }}
        with:
          script: |
            const path = require('path');
            const fs = require('fs');
            const cwd = path.join(process.env.GITHUB_WORKSPACE, '.pr-title-jira');
            process.chdir(cwd);
            const main = require(path.join(cwd, 'lib', 'main.js'));
            await main({ github, context, core });
